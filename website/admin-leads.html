<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swiftbooked — Lead Log</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f9fafb; color: #111827; font-size: 0.9rem; }
    header { background: #1a56db; color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    .nav { display: flex; gap: 12px; }
    .nav a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.85rem; font-weight: 500; }
    .nav a:hover { color: #fff; }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .toolbar h2 { font-size: 1.1rem; }
    .filters { display: flex; gap: 10px; flex-wrap: wrap; }
    select, input { padding: 8px 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-family: inherit; font-size: 0.85rem; outline: none; background: #fff; }
    select:focus, input:focus { border-color: #1a56db; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; text-align: center; }
    .stat-num { font-size: 1.8rem; font-weight: 800; color: #1a56db; line-height: 1; }
    .stat-label { font-size: 0.78rem; color: #6b7280; margin-top: 4px; }
    .leads-list { display: flex; flex-direction: column; gap: 10px; }
    .lead-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; }
    .lead-header { padding: 14px 18px; display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
    .lead-header:hover { background: #f9fafb; }
    .lead-phone { font-weight: 700; font-family: monospace; font-size: 0.92rem; flex-shrink: 0; }
    .lead-meta { flex: 1; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .lead-business { font-size: 0.82rem; color: #6b7280; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.73rem; font-weight: 700; }
    .badge-booked { background: #d1fae5; color: #065f46; }
    .badge-escalated { background: #fee2e2; color: #dc2626; }
    .badge-active { background: #dbeafe; color: #1e40af; }
    .lead-time { font-size: 0.78rem; color: #9ca3af; margin-left: auto; flex-shrink: 0; }
    .lead-chevron { color: #9ca3af; font-size: 0.8rem; flex-shrink: 0; transition: transform 0.15s; }
    .lead-card.open .lead-chevron { transform: rotate(180deg); }
    .lead-messages { display: none; border-top: 1px solid #f3f4f6; padding: 16px 18px; background: #fafafa; }
    .lead-card.open .lead-messages { display: block; }
    .msg-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
    .msg-row:last-child { margin-bottom: 0; }
    .msg-bubble { padding: 8px 12px; border-radius: 10px; font-size: 0.85rem; line-height: 1.5; max-width: 80%; }
    .msg-user .msg-bubble { background: #1a56db; color: #fff; margin-left: auto; }
    .msg-bot .msg-bubble { background: #e5e7eb; color: #111827; }
    .msg-label { font-size: 0.72rem; color: #9ca3af; margin-top: 3px; }
    .msg-user { flex-direction: row-reverse; }
    .booking-badge { background: #d1fae5; color: #065f46; border-radius: 8px; padding: 8px 12px; font-size: 0.82rem; font-weight: 600; margin-top: 10px; }
    .empty { text-align: center; padding: 48px; color: #9ca3af; }
  </style>
</head>
<body>

<header>
  <h1>Swiftbooked — Lead Log</h1>
  <nav class="nav">
    <a href="/admin">← Clients</a>
  </nav>
</header>

<div class="container">
  <div class="stats" id="stats-row"></div>

  <div class="toolbar">
    <h2>All Leads</h2>
    <div class="filters">
      <select id="filter-status" onchange="applyFilters()">
        <option value="">All statuses</option>
        <option value="booked">Booked</option>
        <option value="escalated">Escalated</option>
        <option value="active">Active</option>
      </select>
      <select id="filter-client" onchange="applyFilters()">
        <option value="">All clients</option>
      </select>
      <input type="text" id="filter-search" placeholder="Search phone…" oninput="applyFilters()">
    </div>
  </div>

  <div class="leads-list" id="leads-list">
    <div class="empty">Loading…</div>
  </div>
</div>

<script>
  let allLeads = [];

  async function load() {
    const res = await fetch('/api/admin/leads');
    allLeads = await res.json();
    populateClientFilter();
    renderStats();
    applyFilters();
  }

  function populateClientFilter() {
    const seen = new Set();
    const sel = document.getElementById('filter-client');
    allLeads.forEach(l => {
      if (l.business_name && !seen.has(l.business_name)) {
        seen.add(l.business_name);
        const o = document.createElement('option');
        o.value = l.business_name;
        o.textContent = l.business_name;
        sel.appendChild(o);
      }
    });
  }

  function renderStats() {
    const total = allLeads.length;
    const booked = allLeads.filter(l => l.status === 'booked').length;
    const escalated = allLeads.filter(l => l.status === 'escalated').length;
    const active = allLeads.filter(l => l.status === 'active').length;
    document.getElementById('stats-row').innerHTML = `
      <div class="stat"><div class="stat-num">${total}</div><div class="stat-label">Total Leads</div></div>
      <div class="stat"><div class="stat-num" style="color:#16a34a">${booked}</div><div class="stat-label">Booked</div></div>
      <div class="stat"><div class="stat-num" style="color:#dc2626">${escalated}</div><div class="stat-label">Escalated</div></div>
      <div class="stat"><div class="stat-num" style="color:#1a56db">${active}</div><div class="stat-label">Active</div></div>
    `;
  }

  function applyFilters() {
    const status = document.getElementById('filter-status').value;
    const client = document.getElementById('filter-client').value;
    const search = document.getElementById('filter-search').value.toLowerCase();
    const filtered = allLeads.filter(l =>
      (!status || l.status === status) &&
      (!client || l.business_name === client) &&
      (!search || l.customer_phone.includes(search))
    );
    renderLeads(filtered);
  }

  function renderLeads(leads) {
    const el = document.getElementById('leads-list');
    if (!leads.length) { el.innerHTML = '<div class="empty">No leads found.</div>'; return; }
    el.innerHTML = leads.map((l, i) => {
      const messages = Array.isArray(l.messages) ? l.messages : (JSON.parse(l.messages || '[]'));
      const date = new Date(l.updated_at).toLocaleString('en-CA', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      const badgeClass = l.status === 'booked' ? 'badge-booked' : l.status === 'escalated' ? 'badge-escalated' : 'badge-active';
      const msgCount = messages.filter(m => m.role).length;

      return `
        <div class="lead-card" id="card-${i}">
          <div class="lead-header" onclick="toggle(${i})">
            <div class="lead-phone">${l.customer_phone}</div>
            <div class="lead-meta">
              ${l.business_name ? `<span class="lead-business">${l.business_name}</span>` : ''}
              <span class="badge ${badgeClass}">${l.status}</span>
              ${l.booking_id ? `<span class="badge" style="background:#fef3c7;color:#92400e;">#${l.booking_id}</span>` : ''}
              <span style="font-size:0.78rem;color:#9ca3af;">${msgCount} messages</span>
            </div>
            <div class="lead-time">${date}</div>
            <div class="lead-chevron">▼</div>
          </div>
          <div class="lead-messages">
            ${renderMessages(messages, l)}
          </div>
        </div>`;
    }).join('');
  }

  function renderMessages(messages, lead) {
    const filtered = messages.filter(m => m.role === 'user' || m.role === 'assistant');
    if (!filtered.length) return '<div style="color:#9ca3af;font-size:0.85rem;">No messages recorded.</div>';

    let html = filtered.map(m => {
      const isUser = m.role === 'user';
      const content = typeof m.content === 'string' ? m.content : JSON.stringify(m.content);
      if (content.startsWith('[') || content.length > 500) return '';
      return `<div class="msg-row ${isUser ? 'msg-user' : 'msg-bot'}">
        <div>
          <div class="msg-bubble">${content.replace(/</g,'&lt;')}</div>
          <div class="msg-label">${isUser ? 'Customer' : 'AI'}</div>
        </div>
      </div>`;
    }).join('');

    if (lead.booking_id) {
      html += `<div class="booking-badge">✓ Booked — Confirmation #${lead.booking_id}</div>`;
    }
    return html;
  }

  function toggle(i) {
    const card = document.getElementById('card-' + i);
    card.classList.toggle('open');
  }

  load();
</script>
</body>
</html>
